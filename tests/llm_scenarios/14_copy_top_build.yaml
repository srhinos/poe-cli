name: copy-top-build
category: ninja
goal: >
  Find the most popular Slayer build on poe.ninja. Import it locally so
  I can analyze it in Path of Building. Then check its summary to verify
  the import worked.
expected:
  must_succeed: true
  commands_must_include:
    - "poe ninja builds search"
    - "poe ninja builds import"
    - "poe build summary"
  must_not_find:
    - "traceback"
  blocked: false
