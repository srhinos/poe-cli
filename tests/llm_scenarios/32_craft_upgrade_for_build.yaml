name: craft-upgrade-for-build
category: cross-system
goal: >
  Look at the gear on any local build. Find a rare item with open mod slots
  (check with sim analyze). Then look up what bench crafts or mods could
  fill those slots.
expected:
  must_succeed: true
  commands_must_include:
    - "poe build items list"
    - "poe sim"
  must_not_find:
    - "traceback"
  blocked: false
